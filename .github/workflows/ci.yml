name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: swift test (macOS)
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # The package manifest is swift-tools-version 6.2 and uses package traits
      # (SwiftPM 6.1+) to gate the Linux Silica backend, so the toolchain floor
      # is Swift 6.2 / Xcode 26 on every platform.
      - name: Select newest Xcode 26
        run: sudo xcode-select -s "$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -print | sort -V | tail -n 1)"
      - name: Swift version
        run: swift --version
      - name: Build (strict concurrency is the default in Swift 6 mode)
        run: swift build
      - name: Test
        run: swift test

      # Cross-process render determinism: renders every fixture in two fresh
      # processes (two random hash seeds) and diffs — guards against
      # hashed-collection iteration order leaking into geometry (issue #1),
      # which the in-process StabilityTests can't see (one fixed seed).
      - name: Cross-process determinism
        run: ./scripts/check-determinism.sh

      # The UIKit render branch has no test host, but it must always COMPILE —
      # v0.1.0 shipped an iOS-only build break precisely because nothing
      # exercised this branch.
      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          # Log to a file so compile DIAGNOSTICS survive failure — a bare
          # `tail -30` once ate the error text and left only the list of
          # failed compile commands.
          if ! xcodebuild -scheme MermaidRender \
            -destination 'generic/platform=iOS Simulator' build > ios-build.log 2>&1; then
            grep -E "error:" ios-build.log | sort -u | head -40
            tail -20 ios-build.log
            exit 1
          fi
          tail -5 ios-build.log

  linux:
    name: swift test (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container: swift:6.2
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # MermaidRender's Linux backend draws with Silica (Cairo/FontConfig), so
      # the container needs the graphics + font system libraries and a font.
      # (Off-Apple, MermaidLayout must build on swift-corelibs-foundation where
      # CoreGraphics is absent — this Linux job is what caught the CGVector
      # break, issue #2 — and MermaidRender now also builds + renders here.)
      - name: Install Cairo/FontConfig
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            libcairo2-dev libfontconfig1-dev pkg-config fonts-dejavu-core fontconfig
          fc-cache -f
      - name: Swift version
        run: swift --version
      # The Silica raster backend is behind the `LinuxRaster` trait (default
      # OFF, so Apple consumers stay Silica-free — see Package.swift). The Linux
      # job is the one place that opts in, so it both exercises the backend AND
      # proves the trait actually pulls Silica into the graph.
      - name: Build (whole package, incl. the Silica render backend)
        run: swift build --traits LinuxRaster
      # Runs MermaidLayoutTests (159) plus LinuxRenderTests (the Silica render
      # smoke tests); the Apple-only render tests compile away here.
      - name: Test
        run: swift test --traits LinuxRaster
      # The platform-free core must ALSO build with the default (Silica-free)
      # graph on Linux — that is exactly the configuration a headless
      # `from:`-pinned consumer gets, and it must never regress.
      - name: Build MermaidLayout with default traits (Silica-free graph)
        run: swift build --target MermaidLayout

  # The Kotlin rendering half of the Android bridge (docs/notes/android.md,
  # Phase 2): the `SceneWire` model + `SceneRenderer` (Canvas/Paint) that draws
  # the platform-free scene the C ABI emits. Native x86_64 runner — AAPT2 ships
  # x86_64 only, so this must not run under emulation.
  android:
    name: android (kotlin renderer)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      # Assembles the AAR, runs the JVM unit tests (SceneWire parses the exact
      # JSON `mmk_scene_json` emits, with plain @Serializable classes), and
      # builds the instrumented-test APK so the on-device render test compiles.
      - name: Build library + JVM unit tests + instrumented APK
        run: ./gradlew --no-daemon --console=plain :mermaidkit:assembleDebug :mermaidkit:testDebugUnitTest :mermaidkit:assembleDebugAndroidTest

  # The on-device proof: boot an android-34 emulator (KVM on the runner) and run
  # the instrumented tests — the render test (a scene drawn through the device's
  # real Skia Canvas lands ink) AND the native seam (NativeBridgeTest: a Mermaid
  # source string → JNI → the Swift mmk_* ABI in libmermaidkit.so → SceneWire →
  # render). The native tests need the cross-compiled jniLibs, built first.
  android-emulator:
    name: android (emulator render + jni)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # Cross-compile the JNI .so bundle (libmermaidkit.so + the Swift-runtime
      # closure) into jniLibs/x86_64 via the pinned Swift Android SDK, matching
      # scripts/check-android-build.sh. The emulator arch is x86_64.
      - name: Cross-compile JNI native libs (x86_64)
        working-directory: .
        run: |
          mkdir -p android/mermaidkit/src/main/jniLibs/x86_64
          docker run --rm \
            -v "$PWD":/MermaidKit \
            -v "$PWD/android/mermaidkit/src/main/jniLibs/x86_64":/out \
            swift:6.2.0 bash -c '
              swift sdk install \
                "https://github.com/finagolfin/swift-android-sdk/releases/download/6.2/swift-6.2-RELEASE-android-24-0.1.artifactbundle.tar.gz" \
                --checksum "c26ebfd4e32c0ca1beabcc45729b62042da57ee76d7d043f63f2235da90dc491" >/dev/null 2>&1
              bash /MermaidKit/android/native/build-jni.sh x86_64
            '
          # The container runs as root; hand the .so's back to the runner user so
          # the Gradle build (a different user) can read them.
          sudo chown -R "$(id -u):$(id -g)" android/mermaidkit/src/main/jniLibs
          chmod -R a+r android/mermaidkit/src/main/jniLibs
          ls -1 android/mermaidkit/src/main/jniLibs/x86_64 | wc -l
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: android-actions/setup-android@v3
      - name: Instrumented render + native-seam tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          working-directory: android
          script: ./gradlew --no-daemon :mermaidkit:connectedDebugAndroidTest

  # The release AAR: cross-compile the native .so for all three ABIs (arm64-v8a,
  # armeabi-v7a, x86_64), assemble the release AAR bundling them, and publish to a
  # local Maven repo as a dry run — proving the artifact assembles + is well-formed
  # (this is what `implementation("ai.2389:mermaidkit-android:…")` resolves to).
  android-aar:
    name: android (release aar)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Cross-compile JNI native libs for all ABIs
        working-directory: .
        run: |
          docker pull -q swift:6.2.0
          for abi in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p "android/mermaidkit/src/main/jniLibs/$abi"
            docker run --rm \
              -v "$PWD":/MermaidKit \
              -v "$PWD/android/mermaidkit/src/main/jniLibs/$abi":/out \
              swift:6.2.0 bash -c "
                swift sdk install \
                  'https://github.com/finagolfin/swift-android-sdk/releases/download/6.2/swift-6.2-RELEASE-android-24-0.1.artifactbundle.tar.gz' \
                  --checksum 'c26ebfd4e32c0ca1beabcc45729b62042da57ee76d7d043f63f2235da90dc491' >/dev/null 2>&1
                bash /MermaidKit/android/native/build-jni.sh $abi
              "
          done
          sudo chown -R "$(id -u):$(id -g)" android/mermaidkit/src/main/jniLibs
          chmod -R a+r android/mermaidkit/src/main/jniLibs
          du -sh android/mermaidkit/src/main/jniLibs/*
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Assemble + publish the release AAR (dry run to Maven Local)
        run: ./gradlew --no-daemon --console=plain :mermaidkit:assembleRelease :mermaidkit:publishReleasePublicationToMavenLocal
      - name: Verify the AAR bundles all three ABIs
        run: |
          aar=$(find mermaidkit/build/outputs/aar -name '*-release.aar' | head -1)
          echo "AAR: $aar ($(du -h "$aar" | cut -f1))"
          for abi in arm64-v8a armeabi-v7a x86_64; do
            unzip -l "$aar" | grep -q "jni/$abi/libmermaidkit.so" \
              || { echo "MISSING libmermaidkit.so for $abi"; exit 1; }
          done
          echo "✓ all three ABIs bundled"
